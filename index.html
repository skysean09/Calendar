<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Notion Advanced Calendar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');

    :root {
      --bg-color: #ffffff;
      --text-color: #232323;
      --sub-text-color: #8a8a8a;
      --today-bg: #E11D48;   /* 라이트모드 오늘 날짜 배경: 요청 색상 반영 */
      --today-text: #ffffff;
      --hover-bg: #f0f0f0;
      --memo-bg: #f9f9f9;
      --border-color: #e3e4e8;
      --dot-saved: #ffcc00;   
      --dot-active: #4D71FF;  /* 라이트모드 활성화 도트: 요청 색상 반영 */
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;
        --text-color: #e3e4e8;
        --sub-text-color: #707070;
        --today-bg: #E11D48;   /* 다크모드 오늘 날짜 배경: 요청 색상 반영 */
        --today-text: #ffffff;
        --hover-bg: #252525;
        --memo-bg: #202020;
        --border-color: #303030;
        --dot-saved: #ffd60a;   
        --dot-active: #4D71FF;  /* 다크모드 활성화 도트: 요청 색상 반영 */
      }
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      font-family: 'Black Han Sans', sans-serif;
      transition: background-color 0.3s ease;
    }

    .calendar-container {
      width: 480px;
      height: 400px;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .calendar-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text-color);
      font-family: 'Black Han Sans', sans-serif;
      font-size: 24px;
      cursor: pointer;
      padding: 0 10px;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    /* 주황색 호버 효과 제거 및 크기 확대만 유지 */
    .nav-btn:hover {
      transform: scale(1.2);
    }

    /* 타이틀 주황색 입체 섀도우 제거 후 완전 플랫화 */
    .calendar-title {
      font-size: 26px;
      color: var(--text-color);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .calendar-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      row-gap: 8px;
      column-gap: 6px;
      text-align: center;
    }

    .weekday {
      font-size: 13px;
      color: var(--sub-text-color);
      letter-spacing: 0.5px;
      padding-bottom: 6px;
    }
    .weekday:first-child { color: #E11D48; } /* 일요일 색상 변경 */
    .weekday:last-child { color: #4D71FF; }  /* 토요일 색상 변경 */

    .day-cell {
      position: relative;
      font-size: 18px;
      color: var(--text-color);
      height: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .day-number {
      width: 38px;
      height: 38px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      box-sizing: border-box;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s ease, color 0.2s ease;
    }

    .day-cell:not(.empty):hover .day-number {
      transform: scale(1.12);
      background-color: var(--hover-bg);
    }

    .day-cell.today .day-number {
      background-color: var(--today-bg);
      color: var(--today-text);
    }
    .day-cell.today:hover .day-number {
      background-color: var(--today-bg);
    }

    .day-cell::after {
      content: '';
      position: absolute;
      bottom: 2px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      transition: background-color 0.15s ease;
      background-color: transparent;
    }

    .day-cell.has-memo::after {
      background-color: var(--dot-saved);
    }

    .day-cell.selected::after {
      background-color: var(--dot-active) !important;
    }

    .memo-pad {
      position: absolute;
      top: 0;
      right: -240px;
      width: 240px;
      height: 100%;
      background-color: var(--memo-bg);
      border-left: 1px solid var(--border-color);
      box-sizing: border-box;
      padding: 16px;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 10;
    }

    .memo-pad.open {
      transform: translateX(-240px);
    }

    .memo-top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .close-memo-btn {
      background: none;
      border: none;
      color: var(--sub-text-color);
      font-family: 'Black Han Sans', sans-serif;
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s ease, transform 0.2s ease;
      line-height: 1;
    }

    .close-memo-btn:hover {
      color: var(--dot-active);
      transform: scale(1.1);
    }

    .memo-header {
      font-size: 15px;
      color: var(--text-color);
      letter-spacing: 0.5px;
    }

    .memo-area {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      resize: none;
      color: var(--text-color);
      font-family: sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="calendar-container" id="calendar-container">
    <div class="calendar-header">
      <button class="nav-btn" id="prev-btn">&lt;</button>
      <div class="calendar-title" id="calendar-title">MONTH YEAR</div>
      <button class="nav-btn" id="next-btn">&gt;</button>
    </div>

    <div class="calendar-grid" id="calendar-grid">
      <div class="weekday">SUN</div>
      <div class="weekday">MON</div>
      <div class="weekday">TUE</div>
      <div class="weekday">WED</div>
      <div class="weekday">THU</div>
      <div class="weekday">FRI</div>
      <div class="weekday">SAT</div>
    </div>

    <div class="memo-pad" id="memo-pad">
      <div class="memo-top-bar">
        <button class="close-memo-btn" id="close-memo-btn">&lt;&lt;</button>
        <div class="memo-header" id="memo-date-title">YYYY-MM-DD</div>
      </div>
      <textarea class="memo-area" id="memo-area" placeholder="Write a note..."></textarea>
    </div>
  </div>

  <script>
    let targetDate = new Date();
    let selectedDateKey = "";

    function buildCalendar() {
      const currentYear = targetDate.getFullYear();
      const currentMonth = targetDate.getMonth();
      
      const now = new Date();
      const realYear = now.getFullYear();
      const realMonth = now.getMonth();
      const realToday = now.getDate();

      const monthNames = [
        "JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE",
        "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"
      ];
      document.getElementById('calendar-title').textContent = `${monthNames[currentMonth]} ${currentYear}`;

      const gridContainer = document.getElementById('calendar-grid');
      const currentCells = gridContainer.querySelectorAll('.day-cell');
      currentCells.forEach(cell => cell.remove());

      const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
      const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

      for (let i = 0; i < firstDayIndex; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.classList.add('day-cell', 'empty');
        gridContainer.appendChild(emptyCell);
      }

      for (let day = 1; day <= totalDays; day++) {
        const dayCell = document.createElement('div');
        dayCell.classList.add('day-cell');

        const dayNumber = document.createElement('div');
        dayNumber.classList.add('day-number');
        dayNumber.textContent = day;
        dayCell.appendChild(dayNumber);

        const mKey = String(currentMonth + 1).padStart(2, '0');
        const dKey = String(day).padStart(2, '0');
        const dateStr = `${currentYear}-${mKey}-${dKey}`;
        dayCell.dataset.date = dateStr;

        if (currentYear === realYear && currentMonth === realMonth && day === realToday) {
          dayCell.classList.add('today');
        }

        if (localStorage.getItem(dateStr)) {
          dayCell.classList.add('has-memo');
        }

        if (selectedDateKey === dateStr) {
          dayCell.classList.add('selected');
        }

        dayCell.addEventListener('click', (e) => {
          e.stopPropagation();
          openMemoPad(dateStr);
        });

        gridContainer.appendChild(dayCell);
      }
    }

    function openMemoPad(dateStr) {
      const prevSelected = document.querySelector('.day-cell.selected');
      if (prevSelected) prevSelected.classList.remove('selected');

      selectedDateKey = dateStr;
      document.getElementById('memo-date-title').textContent = dateStr;
      
      const memoArea = document.getElementById('memo-area');
      memoArea.value = localStorage.getItem(dateStr) || "";
      
      const currentCell = document.querySelector(`.day-cell[data-date="${dateStr}"]`);
      if (currentCell) currentCell.appendChild(dayCell); // 기본 요소 유지
      if (currentCell) currentCell.classList.add('selected');

      document.getElementById('memo-pad').classList.add('open');
    }

    function closeMemoPad() {
      document.getElementById('memo-pad').classList.remove('open');
      
      const prevSelected = document.querySelector('.day-cell.selected');
      if (prevSelected) prevSelected.classList.remove('selected');
      selectedDateKey = "";
    }

    function setupEvents() {
      document.getElementById('prev-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        targetDate.setMonth(targetDate.getMonth() - 1);
        buildCalendar();
        closeMemoPad();
      });

      document.getElementById('next-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        targetDate.setMonth(targetDate.getMonth() + 1);
        buildCalendar();
        closeMemoPad();
      });

      document.getElementById('close-memo-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        closeMemoPad();
      });

      document.getElementById('memo-area').addEventListener('input', (e) => {
        if (!selectedDateKey) return;
        const value = e.target.value;
        
        if (value.trim() === "") {
          localStorage.removeItem(selectedDateKey);
        } else {
          localStorage.setItem(selectedDateKey, value);
        }
        
        const activeCell = document.querySelector(`.day-cell[data-date="${selectedDateKey}"]`);
        if (activeCell) {
          if (value.trim() === "") activeCell.classList.remove('has-memo');
          else activeCell.classList.add('has-memo');
        }
      });

      document.getElementById('calendar-container').addEventListener('click', (e) => {
        if (e.target.closest('#memo-pad')) return;
        closeMemoPad();
      });
    }

    function init() {
      buildCalendar();
      setupEvents();
      setInterval(buildCalendar, 60000 * 30);
    }

    window.onload = init;
  </script>
</body>
</html>
